<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stroika Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css">
  <link rel="stylesheet" href="./styles/tokens.css" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/layout.css" />
  <link rel="stylesheet" href="./styles/components.css" />
</head>
<body>
  <a class="skip-link" href="#main">Перейти к содержимому</a>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none">
            <path d="M12 46L28 18L40 34L52 14" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 50H52" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <strong>Stroika</strong>
          <p>Executive Demo Dashboard</p>
        </div>
      </div>

      <nav class="nav" aria-label="Основная навигация">
        <button class="nav-link active" data-tab="overview"><i class="ri-dashboard-line"></i><span>Обзор</span></button>
        <button class="nav-link" data-tab="contractors"><i class="ri-group-line"></i><span>Подрядчики</span></button>
        <button class="nav-link" data-tab="contracts"><i class="ri-file-list-3-line"></i><span>Контракты</span></button>
        <button class="nav-link" data-tab="objects"><i class="ri-building-2-line"></i><span>Объекты</span></button>
        <button class="nav-link" data-tab="forms"><i class="ri-add-circle-line"></i><span>Ввод данных</span></button>
      </nav>

      <div class="sidebar-foot">
        <div class="theme-box">
          <span>Тема</span>
          <button class="theme-toggle" data-theme-toggle aria-label="Сменить тему"></button>
        </div>
        <div class="legend-note">
          Прототип построен на основании Excel и подготовлен для дальнейшего перевода в полноценный web app.
        </div>
      </div>
    </aside>

    <main id="main" class="main-content">
      <header class="topbar">
        <div>
          <p class="eyebrow">Строительная аналитика</p>
          <h1>Демонстрационный дашборд по данным Excel: контракты, объекты, подрядчики и лимиты</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-btn" id="resetFiltersBtn"><i class="ri-refresh-line"></i>Сбросить фильтры</button>
          <button class="primary-btn" id="demoFillBtn"><i class="ri-magic-line"></i>Добавить демо-данные</button>
        </div>
      </header>

      <section class="filters-panel card elevated">
        <div class="filter-grid">
          <label>
            <span>Подрядчик</span>
            <select id="contractorFilter"></select>
          </label>
          <label>
            <span>Тип работ</span>
            <select id="workTypeFilter"></select>
          </label>
          <label>
            <span>Поиск</span>
            <input id="searchFilter" type="search" placeholder="Объект, контракт, подрядчик" />
          </label>
          <label>
            <span>Мин. готовность</span>
            <input id="readinessFilter" type="range" min="0" max="100" step="5" value="0" />
            <small id="readinessValue">0%</small>
          </label>
        </div>
      </section>

      <section id="tab-overview" class="tab-panel active"></section>
      <section id="tab-contractors" class="tab-panel"></section>
      <section id="tab-contracts" class="tab-panel"></section>
      <section id="tab-objects" class="tab-panel"></section>
      <section id="tab-forms" class="tab-panel"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./js/state.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/charts.js"></script>
  <script src="./js/renderers.js"></script>
  <script src="./js/forms.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
