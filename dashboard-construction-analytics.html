<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дашборд аналитики</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="css/context-menu.css">

  <style>
    /* ── skip-link ── */
    .skip-link { position:absolute; left:-9999px; top:0; background:var(--color-primary); color:white; padding:var(--space-2) var(--space-4); z-index:9999; border-radius:0 0 var(--radius-md) var(--radius-md); }
    .skip-link:focus { left:var(--space-4); }
    .mobile-menu-btn { display:none; }

    /* ── page-intro ── */
    .page-intro { display:flex; align-items:flex-start; justify-content:space-between; gap:var(--space-4); margin-bottom:var(--space-5); flex-wrap:wrap; }
    .page-title { font-size:var(--text-xl); font-weight:700; letter-spacing:-0.02em; color:var(--color-text); margin-bottom:4px; }
    .page-desc { color:var(--color-text-muted); font-size:var(--text-sm); max-width:70ch; }

    /* ── grids ── */
    .dashboard-grid   { display:grid; grid-template-columns:2fr 1.1fr; gap:var(--space-5); margin-bottom:var(--space-5); }
    .dashboard-grid-2 { display:grid; grid-template-columns:1.1fr 1fr; gap:var(--space-5); margin-bottom:var(--space-5); }
    .kpi-grid         { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-4); margin-bottom:var(--space-5); }
    .kpi-grid-3       { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-4); margin-bottom:var(--space-5); }
    .chart-fixed    { height:320px; }
    .chart-fixed-sm { height:280px; }
    .chart-fixed-xs { height:240px; }

    /* ── toolbar ── */
    .toolbar-row { display:flex; align-items:center; justify-content:space-between; gap:var(--space-4); margin-bottom:var(--space-4); flex-wrap:wrap; }
    .inline-stats { display:flex; gap:var(--space-4); flex-wrap:wrap; }
    .inline-stat { display:flex; flex-direction:column; gap:2px; }
    .inline-stat span:first-child { color:var(--color-text-faint); font-size:var(--text-xs); text-transform:uppercase; letter-spacing:.05em; font-weight:700; }
    .inline-stat span:last-child  { color:var(--color-text); font-size:var(--text-sm); font-weight:700; font-variant-numeric:tabular-nums lining-nums; }
    .header-chip { display:inline-flex; align-items:center; gap:var(--space-2); padding:var(--space-1) var(--space-3); border-radius:var(--radius-full); background:var(--color-surface-offset); color:var(--color-text-muted); font-size:var(--text-xs); font-weight:600; }

    /* ══════════════════════════════════════════════════
       DASHBOARD SWITCHER
    ══════════════════════════════════════════════════ */
    .dashboard-switcher {
      position: relative;
    }
    .dashboard-switcher-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      background: var(--color-primary);
      color: var(--color-text-inverse);
      font-size: var(--text-sm);
      font-weight: 500;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition-interactive);
    }
    .dashboard-switcher-btn:hover { background: var(--color-primary-hover); }
    .dashboard-switcher-btn svg.chevron {
      transition: transform var(--transition-interactive);
    }
    .dashboard-switcher-btn.open svg.chevron {
      transform: rotate(180deg);
    }
    .dashboard-switcher-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 200px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      z-index: 200;
      overflow: hidden;
    }
    .dashboard-switcher-dropdown.open { display: block; }
    .switcher-option {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      cursor: pointer;
      font-size: var(--text-sm);
      color: var(--color-text);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background var(--transition-interactive);
    }
    .switcher-option:hover { background: var(--color-surface-offset); }
    .switcher-option.active { color: var(--color-primary); font-weight: 600; background: var(--color-primary-highlight); }
    .switcher-option svg { flex-shrink: 0; }
    .switcher-divider { height:1px; background: var(--color-divider); margin: var(--space-1) 0; }

    /* ══════════════════════════════════════════════════
       POTHOLE SIDEBAR (отчёты)
    ══════════════════════════════════════════════════ */
    .ph-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: var(--space-5);
      align-items: start;
    }
    .ph-reports-panel {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: sticky;
      top: var(--space-4);
    }
    .ph-reports-header {
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ph-reports-title {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-text);
    }
    .ph-reports-list {
      max-height: 70vh;
      overflow-y: auto;
    }
    .ph-report-group {
      border-bottom: 1px solid var(--color-divider);
    }
    .ph-report-group:last-child { border-bottom: none; }
    .ph-report-group-label {
      padding: var(--space-2) var(--space-4) var(--space-1);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--color-text-faint);
    }
    .ph-report-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2) var(--space-4);
      cursor: pointer;
      gap: var(--space-2);
      transition: background var(--transition-interactive);
    }
    .ph-report-item:hover { background: var(--color-surface-offset); }
    .ph-report-item.active { background: var(--color-primary-highlight); }
    .ph-report-date {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--color-text);
    }
    .ph-report-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: var(--radius-full);
      font-weight: 700;
      text-transform: uppercase;
    }
    .ph-report-badge.complaints { background: var(--color-error-highlight); color: var(--color-error); }
    .ph-report-badge.regional   { background: var(--color-blue-highlight);  color: var(--color-blue); }
    .ph-report-badge.municipal  { background: var(--color-success-highlight); color: var(--color-success); }
    .ph-report-del {
      opacity: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-faint);
      padding: 2px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      transition: opacity var(--transition-interactive), color var(--transition-interactive);
    }
    .ph-report-item:hover .ph-report-del { opacity: 1; }
    .ph-report-del:hover { color: var(--color-error); }
    .ph-reports-empty {
      padding: var(--space-6) var(--space-4);
      text-align: center;
      color: var(--color-text-faint);
      font-size: var(--text-sm);
    }

    /* ══════════════════════════════════════════════════
       POTHOLE KPI CARDS — ФИКС переполнения
    ══════════════════════════════════════════════════ */
    .ph-kpi-card {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      /* FIX: не даём содержимому вылезать за границу */
      overflow: hidden;
      min-width: 0;
      box-sizing: border-box;
    }
    .ph-kpi-label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--color-text-faint);
      margin-bottom: var(--space-2);
      /* FIX: длинные заголовки переносятся, не вылезают */
      white-space: normal;
      word-break: break-word;
    }
    .ph-kpi-row {
      display: flex;
      /* FIX: flex-start вместо baseline — не даёт строке рваться при переносе */
      align-items: flex-start;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-1);
    }
    .ph-kpi-value {
      /* FIX: уменьшен шрифт — text-xl (24-36px) был слишком крупным для 1/3 ширины */
      font-size: clamp(1.25rem, 2vw + 0.5rem, 1.75rem);
      font-weight: 700;
      color: var(--color-text);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      /* FIX: не позволяем числу вылезать за карточку */
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ph-kpi-delta {
      font-size: var(--text-xs);
      font-weight: 700;
      padding: 2px 7px;
      border-radius: var(--radius-full);
      /* FIX: дельта-бейдж выравнивается по середине числа */
      align-self: center;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ph-kpi-delta.up   { background: var(--color-success-highlight); color: var(--color-success); }
    .ph-kpi-delta.down { background: var(--color-error-highlight);   color: var(--color-error); }
    .ph-kpi-delta.neu  { background: var(--color-surface-offset);    color: var(--color-text-muted); }
    .ph-kpi-sub {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-1);
    }
    .ph-kpi-date {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      margin-top: var(--space-1);
    }

    /* ══════════════════════════════════════════════════
       UPLOAD MODAL
    ══════════════════════════════════════════════════ */
    .upload-type-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .upload-type-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-3);
      border-radius: var(--radius-lg);
      border: 2px solid var(--color-border);
      background: var(--color-surface-2);
      cursor: pointer;
      transition: border-color var(--transition-interactive), background var(--transition-interactive);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text);
      text-align: center;
    }
    .upload-type-btn:hover { border-color: var(--color-primary); background: var(--color-primary-highlight); }
    .upload-type-btn.selected { border-color: var(--color-primary); background: var(--color-primary-highlight); color: var(--color-primary); font-weight: 700; }
    .upload-type-btn svg { color: var(--color-text-faint); }
    .upload-type-btn.selected svg { color: var(--color-primary); }
    .upload-drop-zone {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-8) var(--space-4);
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition-interactive), background var(--transition-interactive);
      margin-bottom: var(--space-4);
    }
    .upload-drop-zone:hover, .upload-drop-zone.drag-over { border-color: var(--color-primary); background: var(--color-primary-highlight); }
    .upload-drop-zone svg { margin: 0 auto var(--space-2); color: var(--color-text-faint); display: block; }
    .upload-drop-zone p { font-size: var(--text-sm); color: var(--color-text-muted); }
    .upload-drop-zone p strong { color: var(--color-primary); }
    .upload-file-name {
      font-size: var(--text-xs);
      color: var(--color-success);
      margin-top: var(--space-2);
      font-weight: 600;
      display: none;
    }
    .upload-file-name.visible { display: block; }

    /* ── donuts 3-col layout ── */
    .ph-donut-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-5); margin-bottom:var(--space-5); }
    .ph-bar-row { margin-bottom: var(--space-5); }
    .ph-week-controls {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    /* ══════════════════════════════════════════════════
       DONUT CARDS — ФИКС: chart-container заполняет
       оставшееся место ВНУТРИ card-body, не дублируя высоту
    ══════════════════════════════════════════════════ */
    .ph-donut-grid .card {
      display: flex;
      flex-direction: column;
    }
    .ph-donut-grid .card-body {
      /* FIX: card-body растягивается на всё доступное место карточки */
      flex: 1;
      /* FIX: фиксированная высота убрана — задаём только на обёртке карточки */
      height: auto !important;
      min-height: 0;
      padding: var(--space-3);
      /* FIX: canvas не должен вылезать */
      overflow: hidden;
      position: relative;
    }
    .ph-donut-grid .chart-container {
      /* FIX: занимаем 100% card-body, НЕ фиксированную высоту */
      width: 100%;
      height: 100% !important;
      position: absolute;
      inset: var(--space-3);
      width: calc(100% - var(--space-6));
    }
    /* FIX: фиксируем высоту на самой карточке пончика, а не на внутренних элементах */
    .ph-donut-grid .card {
      height: 300px;
    }

    /* ── no-data state ── */
    .ph-no-data {
      display: flex;
      flex-direction: column;
      align-items: cen
